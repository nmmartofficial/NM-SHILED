<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NM SHIELD - Temporary Email Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        
        .glass-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(71, 85, 105, 0.3);
        }
        
        .glow-button {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }
        
        .glow-button:hover {
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
        }
        
        .email-iframe-container {
            position: relative;
            width: 100%;
            height: 700px;
            border-radius: 12px;
            overflow: hidden;
            background: #1e293b;
        }
        
        .email-iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 12px;
        }
        
        @media (max-width: 768px) {
            .email-iframe-container {
                height: 600px;
            }
        }
    </style>
</head>
<body class="min-h-screen text-slate-100">
    <!-- Header -->
    <header class="border-b border-slate-700/50 py-6 sticky top-0 z-50 bg-slate-900/95 backdrop-blur">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                        </svg>
                    </div>
                    <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">NM SHIELD</h1>
                </div>
                <div class="text-sm text-slate-400">Retail-Tech Temp Mail</div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Control Panel -->
        <section class="glass-card rounded-2xl p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4 text-center">Temporary Email Dashboard</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 items-center">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Quick Actions</label>
                    <div class="flex flex-wrap gap-3">
                        <button id="refreshIframeBtn" class="px-4 py-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 rounded-lg font-medium transition-all glow-button">
                            <svg class="inline w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                            </svg>
                            Refresh Inbox
                        </button>
                        <button id="openNewTabBtn" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg font-medium transition-colors">
                            <svg class="inline w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-1.586a1 1 0 01-.707-.293l-2.414-2.414a1 1 0 01-.293-.707V4.5"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                            </svg>
                            Open in New Tab
                        </button>
                    </div>
                </div>
                
                <div class="text-right">
                    <p class="text-sm text-slate-400 mb-1">Tip:</p>
                    <p class="text-xs text-slate-500">Use the temp mail interface inside the iframe below!</p>
                </div>
            </div>
        </section>

        <!-- Iframe Inbox Container -->
        <section class="glass-card rounded-2xl p-4">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold">Your Inbox</h2>
                <span class="px-3 py-1 bg-emerald-600/30 text-emerald-300 rounded-full text-sm font-medium">Live</span>
            </div>
            
            <div class="email-iframe-container">
                <iframe 
                    id="emailIframe" 
                    src="https://tempmail.dev/en" 
                    class="email-iframe"
                    title="NM SHIELD Temporary Email"
                    loading="lazy"
                ></iframe>
            </div>
        </section>
    </main>

    <script>
        const emailIframe = document.getElementById('emailIframe');
        const refreshBtn = document.getElementById('refreshIframeBtn');
        const newTabBtn = document.getElementById('openNewTabBtn');

        // Refresh iframe
        refreshBtn.addEventListener('click', () => {
            emailIframe.src = emailIframe.src;
        });

        // Open in new tab
        newTabBtn.addEventListener('click', () => {
            window.open(emailIframe.src, '_blank');
        });

        console.log('✅ NM SHIELD - Temp Mail Iframe loaded successfully!');
    </script>
</body>
</html>
