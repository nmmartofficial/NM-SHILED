<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NM SHIELD - Temporary Email Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        
        .glass-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(71, 85, 105, 0.3);
        }
        
        .glow-button {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }
        
        .glow-button:hover {
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
        }
        
        .pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .email-body {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .otp-highlight {
            animation: otpPulse 1.5s ease-in-out infinite;
            border: 2px solid #10b981 !important;
            background: rgba(16, 185, 129, 0.1) !important;
        }
        
        @keyframes otpPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            50% { box-shadow: 0 0 20px 5px rgba(16, 185, 129, 0.2); }
        }
        
        .no-mail-indicator {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1) 0%, rgba(217, 119, 6, 0.05) 100%);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
    </style>
</head>
<body class="min-h-screen text-slate-100">
    <!-- Header -->
    <header class="border-b border-slate-700/50 py-6 sticky top-0 z-50 bg-slate-900/95 backdrop-blur">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                        </svg>
                    </div>
                    <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">NM SHIELD</h1>
                </div>
                <div class="text-sm text-slate-400">Retail-Tech Temp Mail</div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm-px-6 lg:px-8 py-8">
        <!-- Control Panel -->
        <section class="glass-card rounded-2xl p-8 mb-8">
            <h2 class="text-2xl font-semibold mb-6 text-center">Generate Your Temporary Email</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-12 gap-4 mb-6">
                <div class="md:col-span-5">
                    <label class="block text-sm font-medium text-slate-300 mb-2">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all text-white"
                        placeholder="Enter username"
                    >
                </div>
                <div class="md:col-span-4">
                    <label class="block text-sm font-medium text-slate-300 mb-2">Domain</label>
                    <select 
                        id="domain" 
                        class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all text-white"
                    >
                        <!-- Domains will be populated from the whitelist -->
                    </select>
                </div>
                <div class="md:col-span-3 flex items-end space-x-2">
                    <button id="generateBtn" class="flex-1 px-6 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 rounded-lg font-semibold transition-all duration-300 glow-button">
                        Generate Email
                    </button>
                </div>
            </div>
            
            <!-- Email Display -->
            <div id="emailDisplay" class="hidden">
                <div class="mt-6 p-6 bg-gradient-to-r from-emerald-900/30 to-teal-900/30 border border-emerald-700/50 rounded-xl">
                    <div class="flex items-center justify-between flex-wrap gap-4">
                        <div>
                            <p class="text-sm text-emerald-300 mb-1">Your Temporary Email Address</p>
                            <p id="generatedEmail" class="text-2xl font-bold text-emerald-400 break-all"></p>
                        </div>
                        <div class="flex items-center space-x-2">
                            <button id="copyBtn" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 rounded-lg font-medium transition-colors flex items-center space-x-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012-2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                                </svg>
                                <span>Copy</span>
                            </button>
                            <button id="refreshBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition-colors flex items-center space-x-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                                </svg>
                                <span id="refreshBtnText">Check Inbox</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- Inbox Section -->
        <section class="glass-card rounded-2xl p-8">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-semibold">Inbox</h2>
                <div class="flex items-center gap-4">
                    <span id="apiStatus" class="px-3 py-1 bg-yellow-600/30 text-yellow-300 rounded-full text-sm font-medium">Waiting to Check</span>
                    <span class="px-3 py-1 bg-blue-600/30 text-blue-300 rounded-full text-sm font-medium" id="emailCount">0 Emails</span>
                </div>
            </div>
            
            <!-- No Mail Indicator -->
            <div id="noMailIndicator" class="hidden no-mail-indicator rounded-xl p-4 mb-6 flex items-center space-x-3">
                <svg class="w-6 h-6 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path>
                </svg>
                <span class="text-amber-300 font-medium">No new mail yet</span>
            </div>
            
            <!-- Email List -->
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-slate-700">
                            <th class="text-left py-4 px-4 text-slate-400 font-medium">Sender</th>
                            <th class="text-left py-4 px-4 text-slate-400 font-medium">Subject</th>
                            <th class="text-left py-4 px-4 text-slate-400 font-medium">Date</th>
                            <th class="text-left py-4 px-4 text-slate-400 font-medium">Action</th>
                        </tr>
                    </thead>
                    <tbody id="emailTableBody">
                        <tr id="noEmailsRow">
                            <td colspan="4" class="py-12 text-center text-slate-500">
                                <svg class="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 0 00-2 2v10a2 0 002 2z"></path>
                                </svg>
                                <p class="text-lg">No emails yet! Generate an email first!</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Email Modal -->
            <div id="emailModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
                <div class="glass-card rounded-2xl p-8 max-w-2xl w-full max-h-[90vh] overflow-hidden">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-xl font-bold" id="modalSubject">Email Subject</h3>
                        <button id="closeModalBtn" class="text-slate-400 hover:text-white">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="mb-4">
                        <p class="text-sm text-slate-400">From</p>
                        <p class="font-medium" id="modalFrom">sender@example.com</p>
                    </div>
                    <div class="mb-4">
                        <p class="text-sm text-slate-400">Date</p>
                        <p class="font-medium" id="modalDate">Just Now</p>
                    </div>
                    <div class="border-t border-slate-700 pt-4">
                        <p class="text-sm text-slate-400 mb-2">Message</p>
                        <div id="modalBody" class="email-body text-slate-200 bg-slate-900/50 p-4 rounded-lg whitespace-pre-wrap"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // -------------- CONFIGURATION - EDIT HERE EASILY --------------
        const AVAILABLE_DOMAINS = [
            'tinpho.com', 
            'botgetlink.com', 
            'bombibi.com', 
            'fbhotro.com', 
            'dogclothing.org', 
            'adn3t.com', 
            'beelsil.com'
        ];
        const STORAGE_KEYS = {
            CURRENT_EMAIL: 'nmshield_current_email',
            CURRENT_LOGIN: 'nmshield_current_login',
            CURRENT_DOMAIN: 'nmshield_current_domain',
            EMAILS: 'nmshield_emails'
        };
        const OTP_VALIDITY_MINUTES = 2; // OTP valid for 2 minutes
        // --------------------------------------------------------------

        let currentLogin = null;
        let currentDomain = null;
        let currentEmail = null;
        let emails = [];
        let isCheckingInbox = false;

        // Save data to localStorage
        function saveToStorage() {
            localStorage.setItem(STORAGE_KEYS.CURRENT_EMAIL, currentEmail);
            localStorage.setItem(STORAGE_KEYS.CURRENT_LOGIN, currentLogin);
            localStorage.setItem(STORAGE_KEYS.CURRENT_DOMAIN, currentDomain);
            localStorage.setItem(STORAGE_KEYS.EMAILS, JSON.stringify(emails));
        }

        // Load data from localStorage
        function loadFromStorage() {
            const savedEmail = localStorage.getItem(STORAGE_KEYS.CURRENT_EMAIL);
            const savedLogin = localStorage.getItem(STORAGE_KEYS.CURRENT_LOGIN);
            const savedDomain = localStorage.getItem(STORAGE_KEYS.CURRENT_DOMAIN);
            const savedEmails = localStorage.getItem(STORAGE_KEYS.EMAILS);
            
            if (savedEmail && savedLogin && savedDomain) {
                currentEmail = savedEmail;
                currentLogin = savedLogin;
                currentDomain = savedDomain;
                
                if (savedEmails) {
                    try {
                        emails = JSON.parse(savedEmails);
                    } catch (e) {
                        console.error('Failed to parse saved emails:', e);
                        emails = [];
                    }
                }
                
                return true;
            }
            
            return false;
        }

        // Clear old data when generating a new email
        function clearOldData() {
            emails = [];
        }

        // Generate random 6-digit OTP
        function generateOTP() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        // Initialize domain dropdown with whitelisted domains only
        function initDomainDropdown() {
            const domainSelect = document.getElementById('domain');
            domainSelect.innerHTML = '';
            
            AVAILABLE_DOMAINS.forEach(domain => {
                const option = document.createElement('option');
                option.value = domain;
                option.textContent = `@${domain}`;
                domainSelect.appendChild(option);
            });
        }

        // Generate random username
        function generateRandomUsername() {
            const adjectives = ['happy', 'swift', 'clever', 'brave', 'calm', 'eager', 'gentle', 'keen'];
            const nouns = ['panda', 'tiger', 'eagle', 'dolphin', 'fox', 'wolf', 'bear', 'lion'];
            const numbers = Math.floor(Math.random() * 10000);
            return adjectives[Math.floor(Math.random() * adjectives.length)] + nouns[Math.floor(Math.random() * nouns.length)] + numbers;
        }

        // Format date
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMins / 60);
            const diffDays = Math.floor(diffHours / 24);
            
            if (diffMins < 1) return "Just Now";
            if (diffMins < 60) return `${diffMins} min ago`;
            if (diffHours < 24) return `${diffHours} hours ago`;
            return `${diffDays} days ago`;
        }

        // Check if content looks like an OTP
        function isOTPContent(text) {
            if (!text) return false;
            const otpPatterns = [
                /\b\d{4,8}\b/,  // 4-8 digit numbers (common OTP)
                /\bOTP\b/i,
                /\bcode\b/i,
                /\bverify\b/i,
                /\bverification\b/i
            ];
            return otpPatterns.some(pattern => pattern.test(text));
        }

        // Render emails
        function renderEmails() {
            const emailTableBody = document.getElementById('emailTableBody');
            const emailCountEl = document.getElementById('emailCount');
            const noMailIndicator = document.getElementById('noMailIndicator');
            
            emailCountEl.textContent = `${emails.length} Email${emails.length !== 1 ? 's' : ''}`;
            
            if (emails.length === 0) {
                // Show "No new mail" indicator and empty table
                noMailIndicator.classList.remove('hidden');
                emailTableBody.innerHTML = `
                    <tr id="noEmailsRow">
                        <td colspan="4" class="py-12 text-center text-slate-500">
                            <svg class="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 0 00-2-2H5a2 0 00-2 2v10a2 0 002 2z"></path>
                            </svg>
                            <p class="text-lg">No emails yet! Check back later!</p>
                        </td>
                    </tr>
                `;
                return;
            }
            
            // Hide "No new mail" indicator
            noMailIndicator.classList.add('hidden');
            
            const colors = [
                'from-purple-500 to-pink-500',
                'from-blue-500 to-cyan-500',
                'from-orange-500 to-red-500',
                'from-green-500 to-emerald-500',
                'from-yellow-500 to-amber-500'
            ];
            
            emailTableBody.innerHTML = emails.map((email, index) => {
                const isOTP = isOTPContent(email.subject) || isOTPContent(email.body);
                return `
                <tr class="border-b border-slate-800 hover:bg-slate-800/50 transition-colors cursor-pointer ${isOTP ? 'otp-highlight' : ''}">
                    <td class="py-4 px-4">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 bg-gradient-to-br ${colors[index % colors.length]} rounded-full flex items-center justify-center">
                                <span class="text-sm font-semibold">${(email.from || 'unknown').substring(0, 2).toUpperCase()}</span>
                            </div>
                            <div class="flex items-center space-x-2">
                                <span class="font-medium">${email.from || 'unknown'}</span>
                                ${isOTP ? '<span class="px-2 py-0.5 bg-emerald-600/20 text-emerald-400 rounded-full text-xs font-semibold">OTP</span>' : ''}
                            </div>
                        </div>
                    </td>
                    <td class="py-4 px-4">${email.subject || '(No Subject)'}</td>
                    <td class="py-4 px-4 text-slate-400">${formatDate(email.date || new Date())}</td>
                    <td class="py-4 px-4">
                        <button onclick="readEmail(${email.id || 0})" class="px-3 py-1 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm font-medium transition-colors">View</button>
                    </td>
                </tr>
            `}).join('');
        }

        // Check inbox - optimized for OTP!
        async function checkInbox() {
            if (!currentLogin || !currentDomain) {
                return;
            }
            
            if (isCheckingInbox) {
                return; // Prevent duplicate clicks
            }

            const apiStatusEl = document.getElementById('apiStatus');
            const refreshBtn = document.getElementById('refreshBtn');
            const refreshBtnText = document.getElementById('refreshBtnText');
            
            // Set loading state
            isCheckingInbox = true;
            refreshBtn.disabled = true;
            refreshBtn.classList.add('opacity-70', 'cursor-not-allowed');
            refreshBtnText.textContent = 'Checking...';
            
            apiStatusEl.textContent = 'Checking for new mail...';
            apiStatusEl.className = 'px-3 py-1 bg-blue-600/30 text-blue-300 rounded-full text-sm font-medium pulse';

            // --- Simulated API Call (replace with real tmailor API when ready) ---
            // For now, we'll use demo data to show the features working
            await new Promise(resolve => setTimeout(resolve, 1500)); // Simulate network delay
            
            // Generate fresh OTP with 2 minutes validity
            const otp = generateOTP();
            const now = new Date();
            const validUntil = new Date(now.getTime() + OTP_VALIDITY_MINUTES * 60000);
            
            // Demo emails - fresh OTP with validity info
            const demoEmails = [
                {
                    id: Date.now(),
                    from: 'noreply@myapp.com',
                    subject: `Your Verification OTP: ${otp}`,
                    body: `Your One-Time Password (OTP) for verification is: ${otp}

This OTP is valid for ${OTP_VALIDITY_MINUTES} minutes.
Valid Until: ${validUntil.toLocaleString()}

Do not share this OTP with anyone.`,
                    date: now.toISOString()
                }
            ];
            
            emails = demoEmails;
            renderEmails();
            saveToStorage(); // Save updated emails
            
            // Update state to ready
            apiStatusEl.textContent = emails.length > 0 ? '✅ New mail received!' : '✅ Inbox is up to date';
            apiStatusEl.className = emails.length > 0 
                ? 'px-3 py-1 bg-emerald-600/30 text-emerald-300 rounded-full text-sm font-medium' 
                : 'px-3 py-1 bg-green-600/30 text-green-300 rounded-full text-sm font-medium';
            
            // Reset button state
            isCheckingInbox = false;
            refreshBtn.disabled = false;
            refreshBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            refreshBtnText.textContent = 'Check Inbox';
            
            console.log('Checking inbox for:', `${currentLogin}@${currentDomain}`);
        }

        // Read single email
        async function readEmail(id) {
            if (!currentLogin || !currentDomain) return;
            
            // Find email in our list
            const email = emails.find(e => e.id === id) || emails[0];
            
            document.getElementById('modalSubject').textContent = email?.subject || 'Demo Email Subject';
            document.getElementById('modalFrom').textContent = email?.from || 'demo@example.com';
            document.getElementById('modalDate').textContent = formatDate(email?.date || new Date());
            document.getElementById('modalBody').textContent = email?.body || 'This is a demo email. Replace with actual tmailor API integration!';
            
            document.getElementById('emailModal').classList.remove('hidden');
        }

        // Generate email button - with domain whitelist validation
        document.getElementById('generateBtn').addEventListener('click', () => {
            const usernameInput = document.getElementById('username');
            const domainSelect = document.getElementById('domain');
            const emailDisplay = document.getElementById('emailDisplay');
            const generatedEmailEl = document.getElementById('generatedEmail');
            const apiStatusEl = document.getElementById('apiStatus');
            
            let username = usernameInput.value.trim();
            if (!username) {
                username = generateRandomUsername();
                usernameInput.value = username;
            }

            const selectedDomain = domainSelect.value;
            
            // Validate domain is in our whitelist
            if (!AVAILABLE_DOMAINS.includes(selectedDomain)) {
                alert('Error: Invalid domain selected! Please choose from the approved list.');
                return;
            }

            // Clear old data for new email
            clearOldData();
            
            currentLogin = username;
            currentDomain = selectedDomain;
            currentEmail = `${currentLogin}@${currentDomain}`;
            
            generatedEmailEl.textContent = currentEmail;
            emailDisplay.classList.remove('hidden');
            
            apiStatusEl.textContent = "✅ Ready";
            apiStatusEl.className = "px-3 py-1 bg-emerald-600/30 text-emerald-300 rounded-full text-sm font-medium";
            
            renderEmails();
            saveToStorage(); // Save everything
            
            emailDisplay.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });

        // Copy button
        document.getElementById('copyBtn').addEventListener('click', () => {
            if (!currentEmail) return;
            
            navigator.clipboard.writeText(currentEmail).then(() => {
                const btn = document.getElementById('copyBtn');
                const originalHTML = btn.innerHTML;
                btn.innerHTML = `
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                    <span>Copied!</span>
                `;
                
                btn.classList.remove('bg-emerald-600', 'hover:bg-emerald-700');
                btn.classList.add('bg-green-600', 'hover:bg-green-700');
                
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.classList.remove('bg-green-600', 'hover:bg-green-700');
                    btn.classList.add('bg-emerald-600', 'hover:bg-emerald-700');
                }, 2000);
            });
        });

        // Refresh button - optimized
        document.getElementById('refreshBtn').addEventListener('click', checkInbox);

        // Close modal
        document.getElementById('closeModalBtn').addEventListener('click', () => {
            document.getElementById('emailModal').classList.add('hidden');
        });

        // Close modal on outside click
        document.getElementById('emailModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('emailModal')) {
                document.getElementById('emailModal').classList.add('hidden');
            }
        });

        // Initialize everything on load
        window.addEventListener('load', () => {
            initDomainDropdown();
            
            // Try to load from storage
            if (loadFromStorage()) {
                // Restore UI state
                const usernameInput = document.getElementById('username');
                const domainSelect = document.getElementById('domain');
                const emailDisplay = document.getElementById('emailDisplay');
                const generatedEmailEl = document.getElementById('generatedEmail');
                
                usernameInput.value = currentLogin;
                
                // Select the saved domain
                setTimeout(() => {
                    for (let i = 0; i < domainSelect.options.length; i++) {
                        if (domainSelect.options[i].value === currentDomain) {
                            domainSelect.selectedIndex = i;
                            break;
                        }
                    }
                }, 100);
                
                generatedEmailEl.textContent = currentEmail;
                emailDisplay.classList.remove('hidden');
                
                renderEmails();
                
                console.log('✅ Restored session from storage');
            }
            
            console.log('✅ NM SHIELD - Temp Mail loaded successfully!');
